# =============================================================================
# Test database connection — H2 in-memory (always, regardless of production DB)
# MODE=MySQL makes H2 behave like MySQL for SQL compatibility in tests.
# =============================================================================

db.url      = jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
db.user     = sa
db.password =
db.driver   = org.h2.Driver
